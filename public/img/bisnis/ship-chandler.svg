<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logistik maritim — ship chandler">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#081826"/>
      <stop offset="1" stop-color="#0C2A3A"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#103B4E"/>
      <stop offset="1" stop-color="#1B7A8C"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky)"/>

  <!-- matahari / node -->
  <circle cx="618" cy="148" r="46" fill="#E0A23B"/>
  <circle cx="618" cy="148" r="58" fill="none" stroke="#F0C173" stroke-width="2" opacity="0.4"/>

  <!-- garis horizon -->
  <rect x="0" y="372" width="800" height="2" fill="#E0A23B" opacity="0.25"/>

  <!-- kapal kargo -->
  <g>
    <!-- kontainer -->
    <rect x="262" y="250" width="78" height="36" rx="3" fill="#E0A23B"/>
    <rect x="344" y="250" width="78" height="36" rx="3" fill="#3FA7B8"/>
    <rect x="426" y="250" width="78" height="36" rx="3" fill="#C4502A"/>
    <rect x="262" y="290" width="78" height="36" rx="3" fill="#3FA7B8"/>
    <rect x="344" y="290" width="78" height="36" rx="3" fill="#C4502A"/>
    <rect x="426" y="290" width="78" height="36" rx="3" fill="#E0A23B"/>
    <!-- anjungan -->
    <rect x="512" y="232" width="46" height="94" rx="4" fill="#102A3B"/>
    <rect x="522" y="246" width="26" height="12" rx="2" fill="#9FB3BD" opacity="0.7"/>
    <!-- lambung -->
    <path d="M232 326 H576 L548 372 H260 Z" fill="#081826"/>
    <rect x="232" y="320" width="344" height="8" fill="#0E3346"/>
    <!-- tiang -->
    <rect x="300" y="206" width="5" height="46" fill="#9FB3BD" opacity="0.6"/>
  </g>

  <!-- laut -->
  <rect x="0" y="374" width="800" height="226" fill="url(#sea)"/>
  <!-- pantulan matahari -->
  <g fill="#E0A23B" opacity="0.35">
    <rect x="610" y="388" width="16" height="4" rx="2"/>
    <rect x="606" y="404" width="24" height="4" rx="2"/>
    <rect x="612" y="420" width="12" height="4" rx="2"/>
  </g>
  <!-- ombak -->
  <g stroke="#3FA7B8" stroke-width="3" stroke-linecap="round" opacity="0.6" fill="none">
    <path d="M70 430 q30 -16 60 0 t60 0"/>
    <path d="M360 470 q30 -16 60 0 t60 0"/>
    <path d="M150 520 q30 -16 60 0 t60 0"/>
    <path d="M520 510 q30 -16 60 0 t60 0"/>
  </g>
</svg>
